# Whitelist fuer Tools, die ueberhaupt mit level="admin" PIN-bestaetigt
# werden duerfen. Auch wenn ein Tool in permissions.toml als "admin" steht,
# wird es sofort abgelehnt, wenn es nicht hier auftaucht. Doppelte
# Sicherheit gegen Konfig-Fehler.

[admin]
tools = [
    "admin.reboot",
    "admin.shutdown",
    "admin.cancel_shutdown",
    "admin.update_check",
    "admin.cleanup_temp",
    "admin.flush_dns",
    "admin.restart_service",
    "admin.list_services",
    "admin.kill_process_force",
    "admin.git_pull_repo",
]
